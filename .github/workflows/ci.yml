name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # jeden Montag 06:00 UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew lintDebug
        env:
          SENTRY_DSN: ""

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew testDebug
        env:
          SENTRY_DSN: ""

  detekt:
    name: Static Analysis (detekt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew detekt
        env:
          SENTRY_DSN: ""

  assemble:
    name: Assemble Debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew assembleDebug
        env:
          SENTRY_DSN: ""

  assemble-release:
    name: Assemble Release
    needs: [lint, test, assemble]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks
      - name: Create keystore.properties
        run: |
          echo "storeFile=/tmp/keystore.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
      - run: ./gradlew assembleRelease
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Crisix ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            app/build/outputs/apk/release/app-release.apk
        env:
          GH_TOKEN: ${{ github.token }}

  check:
    name: Check
    needs: [lint, test, detekt, assemble]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "lint=${{ needs.lint.result }}"
          echo "test=${{ needs.test.result }}"
          echo "detekt=${{ needs.detekt.result }}"
          echo "assemble=${{ needs.assemble.result }}"
          if [ "${{ needs.lint.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.test.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.detekt.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.assemble.result }}" != "success" ]; then exit 1; fi
